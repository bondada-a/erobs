controller_names:
  - scaled_joint_trajectory_controller
  - gripper_controller

scaled_joint_trajectory_controller:
  type: FollowJointTrajectory
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint

gripper_controller:
  type: FollowJointTrajectory
  joints:
    - joint_finger
