# AprilTag Detection Configuration
# Parameter reference: https://github.com/christianrauch/apriltag_ros
apriltag_detector:
  ros__parameters:
    # Tag family: 16h5, 25h9, 36h11, Circle21h7, etc.
    family: 36h11

    # Default tag edge size in meters (used if not specified in tag.sizes)
    size: 0.008  # 8mm tags (measured after printing)

    # Image format
    image_transport: raw

    # Pose estimation method
    pose_estimation_method: pnp

    # Profiling
    profile: false

    # QoS overrides for image subscription (must match camera publisher)
    qos_overrides:
      /color/image_color:
        subscription:
          reliability: reliable
          durability: volatile
      /color/camera_info:
        subscription:
          reliability: reliable
          durability: volatile

    # Detection parameters
    max_hamming: 0  # Maximum allowed hamming distance (corrected bits)

    detector:
      threads: 4          # Number of threads for detection
      decimate: 1.0       # Decimate resolution for quad detection (1.0 = full res)
      blur: 0.0           # Sigma of Gaussian blur for quad detection
      refine: true        # Snap to strong gradients
      sharpening: 0.25    # Sharpening of decoded images
      debug: false        # Write debugging images to working directory

    # Tag-specific configuration
    # REQUIRED: tag.ids must be specified to publish TF transforms!
    # If tag.ids is empty, detections work but NO TF is published
    tag:
      ids: [0, 1]              # Tag IDs for which to publish TF transforms
      sizes: [0.008, 0.008]    # Tag-specific sizes (must match length of ids)
      # frames: []             # Optional: custom frame names (omitted = use default tag36h11:X)