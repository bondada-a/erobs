# Default Beamline Configuration
# This config maintains the current system behavior
# Use this as a template for creating beamline-specific configs

beamline: "default"

robot:
  model: "ur5e"
  ip: "192.168.56.101"          # Default IP from current launch files
  arm_group: "ur_arm"
  ik_frame: "tool0"

grippers:
  none:
    moveit_package: "ur_standalone_moveit_config"
    tool_voltage: 0
    group_name: ""              # No gripper group

  hande:
    moveit_package: "ur_zivid_hande_moveit_config"
    tool_voltage: 24
    group_name: "hande_gripper"

  epick:
    moveit_package: "ur_zivid_epick_moveit_config"
    tool_voltage: 24
    group_name: "epick_gripper"

  pipettor:
    moveit_package: "ur_zivid_pipettor_moveit_config"
    tool_voltage: 24
    group_name: ""              # Pipettor has no gripper group

available_grippers:
  - none
  - hande
  - epick
  - pipettor

workspace:
  obstacle_config: "config/beamline_scene.yaml"

planning:
  velocity_scaling: 0.2
  acceleration_scaling: 0.2
