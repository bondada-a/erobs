# Shared planning scene for all MoveIt configurations
# All obstacles that should be present regardless of end-effector

obstacles:
  # Robot base pedestal/mount (8in x 8in x 10in)
  - name: "robot_base"
    type: "box"
    frame: "map"
    pose:
      x: 0.0
      y: 0.0
      z: -0.1275  # Half height (10in/2 = 5in = 0.127m) below origin
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    size: [0.203, 0.203, 0.254]  # [8in, 8in, 10in] in meters

  # Thorlabs optical table B3648FX (36" x 48" x 2.28")
  - name: "thorlabs_table"
    type: "box"
    frame: "map"
    pose:
      x: -0.3810   # 9" from edge along 48" dimension = -15" from center
      y: -0.3556   # 4" from edge along 36" dimension = -14" from center
      # z: -0.283  # Table top below robot base
      z: -0.483
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    size: [1.2192, 0.9144, 0.05791]  # [48in, 36in, 2.28in] in meters

  # Custom cylinder obstacle (5cm radius, 42" length minus 15cm)
  - name: "beam_cylinder"
    type: "cylinder"
    frame: "base"
    pose:
      x: 0.36     # 15 inches in meters (relative to base)
      y: 0.0       # 0 inches
      z: 0.205     # 10 inches in meters (relative to base)
      roll: 1.5708  # 90 degrees rotation around X axis
      pitch: 0.0
      yaw: 0.0
    height: 1.0668   # 42 inches in meters
    radius: 0.05     # 5cm in meters

  # Custom box obstacle (16" x 28" x 50")
  - name: "detector"
    type: "box"
    frame: "base"
    pose:
      x: 0.0       # 0 inches (relative to base)
      # y: 1.0    # 38 inches in meters (relative to base)
      # y: 0.95
      y: 0.85    # detector closer
      z: 0.1    # -10 inches in meters (relative to base)
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    size: [0.7112,0.4064, 1.27]  # [28in, 16in, 50in] in meters

# Hot plate stage for CMS beamline
  - name: "hotplatestage"
    type: "box"
    frame: "map"
    pose:
      x: -0.35
      y: -0.50
      z: 0.0
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    size: [0.3, 0.3, 0.5]

  - name: "rightside_obstacles"
    type: "box"
    frame: "map"
    pose:
      x: 0.0       
      y: 0.60    
      z: 0.1    
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    size: [0.7112,0.4064, 1.27] 

  - name: "top_railing"
    type: "box"
    frame: "map"
    pose:
      x: -0.3810   # 9" from edge along 48" dimension = -15" from center
      y: -0.3556   # 4" from edge along 36" dimension = -14" from center
      # z: -0.283  # Table top below robot base
      z: 1.02
      roll: 0.0
      pitch: 0.0
      yaw: 0.0
    size: [1.2192, 0.9144, 0.05791]  # [48in, 36in, 2.28in] in meters

# Note: Add more obstacles here as needed
# Supported types: box, cylinder, sphere
