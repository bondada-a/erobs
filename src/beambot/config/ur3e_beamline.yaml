# UR3e Beamline Configuration
# Example configuration for a UR3e robot with Hand-E gripper
# Based on ur3e_hande_moveit_config SRDF

beamline: "ur3e_test"

robot:
  model: "ur3e"
  ip: "192.168.56.102"          # Change this to your UR3e's actual IP
  arm_group: "ur_arm"           # From SRDF line 12
  ik_frame: "tool0"             # Standard UR tool frame

grippers:
  # Hand-E gripper configuration for UR3e
  hande:
    moveit_package: "ur3e_hande_moveit_config"
    tool_voltage: 24
    gripper_group: "hand"       # From SRDF line 24
    states:
      grasp: "hande_closed"
      release: "hande_open"

  # Note: Add other UR3e gripper configs here when available
  # Example: ur3e_epick_moveit_config, ur3e_standalone_moveit_config, etc.
