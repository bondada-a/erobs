# Zivid "Manufacturing: Specular" 3D capture preset — FULL-RESOLUTION variant.
# Identical to manufacturing_specular.yml except Sampling.Pixel is "all" instead
# of "by2x2": this captures the FULL sensor (~2448x2048 ≈ 5M points/cloud, ~4x
# more than by2x2's 1224x1024) at the cost of ~4x data and slightly noisier
# per-point depth on shiny/specular surfaces (by2x2 binning improves SNR there).
# Use for high-resolution scene mapping where point density beats per-point SNR.
# Serialized base from Zivid SDK 2.17.1 for model zivid2PlusMR60.
__version__: 27
Settings:
  Acquisitions:
    - Acquisition:
        Aperture: 2.83
        Brightness: 1.25
        ExposureTime: 900
        Gain: 2
    - Acquisition:
        Aperture: 2.83
        Brightness: 2.5
        ExposureTime: 5000
        Gain: 2
  Color:
    __version__: 8
    Settings2D:
      Acquisitions:
        - Acquisition:
            Aperture: 2.83
            Brightness: 2.5
            ExposureTime: 900
            Gain: 2
      Processing:
        Color:
          Balance:
            Blue: 1
            Green: 1
            Red: 1
          Experimental:
            Mode: automatic
          Gamma: 1
      Sampling:
        Color: rgb
        Interval:
          Duration: __not_set__
          Enabled: __not_set__
        Pixel: all
  Diagnostics:
    Enabled: no
  Engine: sage
  Processing:
    Color:
      Balance:
        Blue: __not_set__
        Green: __not_set__
        Red: __not_set__
      Experimental:
        Mode: __not_set__
      Gamma: __not_set__
    Filters:
      Cluster:
        Removal:
          Enabled: yes
          MaxNeighborDistance: 3.5
          MinArea: 50
      Experimental:
        ContrastDistortion:
          Correction:
            Enabled: yes
            Strength: 0.2
          Removal:
            Enabled: yes
            Threshold: 0.3
      Hole:
        Repair:
          Enabled: yes
          HoleSize: 0.3
          Strictness: 4
      Noise:
        Removal:
          Enabled: yes
          Threshold: 2
        Repair:
          Enabled: yes
        Suppression:
          Enabled: no
      Outlier:
        Removal:
          Enabled: yes
          Threshold: 5
      Reflection:
        Removal:
          Enabled: yes
          Mode: global
      Smoothing:
        Gaussian:
          Enabled: yes
          Sigma: 1.5
    Resampling:
      Mode: disabled
  RegionOfInterest:
    Box:
      Enabled: no
      Extents: [-10, 100]
      PointA: [0, 0, 0]
      PointB: [0, 0, 0]
      PointO: [0, 0, 0]
    Depth:
      Enabled: no
      Range: [300, 1100]
  Sampling:
    Color: __not_set__
    Pixel: all
