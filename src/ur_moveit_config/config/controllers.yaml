controller_names:
  - scaled_joint_trajectory_controller
  - joint_trajectory_controller
  - gripper_controller


scaled_joint_trajectory_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: true
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint


joint_trajectory_controller:
  action_ns: follow_joint_trajectory
  type: FollowJointTrajectory
  default: false
  joints:
    - shoulder_pan_joint
    - shoulder_lift_joint
    - elbow_joint
    - wrist_1_joint
    - wrist_2_joint
    - wrist_3_joint
  
gripper_controller:
  action_ns: gripper_trajectory_controller/follow_joint_trajectory
  type: gripper_service_trajectory_controller/GripperServiceTrajectoryController
  default: true
  joints:
    - joint_finger

