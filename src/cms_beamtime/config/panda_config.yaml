/**:
  ros__parameters:
    # Total planning attempts
    max_solutions: 5
    execute: true

    # Planning group and link names
    arm_group_name: "ur_arm"
    eef_name: "hande_gripper"
    hand_group_name: "hande_gripper"
    hand_frame: "flange"

    # Poses
    hand_open_pose: "hande_open"
    hand_close_pose: "hande_closed"
    arm_home_pose: "moveit_home"

    # Scene frames
    world_frame: "base_link"
    table_reference_frame: "base_link"
    object_reference_frame: "base_link"
    surface_link: "table"

    # Collision object for picking
    # CYLINDER object specifications
    object_name: "object"
    object_dimensions: [0.25, 0.02] # [height, radius]
    object_pose: [0.75, -0.25, 0.0, 0.0, 0.0, 0.0]

    # Table model
    spawn_table: true
    table_name: "table"
    table_dimensions: [0.4, 0.5, 0.1]  # [length, width, height]
    table_pose: [0.75, -0.25, 0.0, 0.0, 0.0, 0.0]

    # Gripper grasp frame transform [x,y,z,r,p,y]
    grasp_frame_transform: [0.14, 0.0, 0.0, 0.0, 0.0, -1.5708]
    
    # Place pose [x,y,z,r,p,y]
    place_pose: [0.6, -0.15, 0.0, 0.0, 0.0, 0.0]
    place_surface_offset: 0.01 # place offset from table

    # Valid distance range when approaching an object for picking
    approach_object_min_dist: 0.01
    approach_object_max_dist: 0.15

    # Valid height range when lifting an object after pick
    lift_object_min_dist: 0.1
    lift_object_max_dist: 0.15
