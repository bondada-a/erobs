###############################################
# Modify all parameters here for your robot
###############################################

/**:
  ros__parameters:
    ## Properties of incoming commands
    command_in_type: "unitless" # "unitless" or "speed_units"
    scale:
      # Scale parameters are only used if command_in_type=="unitless"
      linear: 0.4  # Max linear velocity. Unit is [m/s]. Only used for Cartesian commands.
      rotational: 0.8 # Max angular velocity. Unit is [rad/s]. Only used for Cartesian commands.
      # Max joint angular/linear velocity. Only used for joint commands on joint_command_in_topic.
      joint: 0.5

    # Optionally override Servo's internal velocity scaling when near singularity or collision (0.0 = use internal velocity scaling)
    # override_velocity_scaling_factor: 0.0 # valid range [0.0:1.0]

    ## Properties of outgoing commands
    publish_period: 0.034  # 1/Nominal publish rate [seconds]

    ## Incoming Joint State properties
    low_latency_mode: false  # Set this to true to get the freshest data at the cost of thread safety

    # What type of topic does your robot driver expect?
    # Currently supported are std_msgs/Float64MultiArray or trajectory_msgs/JointTrajectory
    command_out_type: trajectory_msgs/JointTrajectory

    # What to publish? Can save some bandwidth as most robots only require positions or velocities
    publish_joint_positions: true
    publish_joint_velocities: true
    publish_joint_accelerations: false

    ## Plugins for smoothing outgoing commands
    use_smoothing: true
    smoothing_filter_plugin_name: "online_signal_smoothing::ButterworthFilterPlugin"

    ## MoveIt properties
    move_group_name: ur_arm  # The move group name from your SRDF
    planning_frame: base_link  # The MoveIt planning frame. Often 'base_link' or 'world'

    ## Other frames
    ee_frame_name: tool0  # The name of the end effector link, used to return the EE pose
    robot_link_command_frame: base_link  # commands must be given in the coordinates of a robot link. Usually either the base or end effector

    ## Stopping behaviour
    incoming_command_timeout: 0.5  # Stop servoing if X seconds elapse without a new command
    # Lower thresh limits are unintended motions from residual commands
    # Values 0.001-0.01 recommended
    lower_singularity_threshold: 17.0  # Start decelerating when the condition number hits this (close to singularity)
    hard_stop_singularity_threshold: 30.0 # Stop when the condition number hits this
    joint_limit_margin: 0.1 # added as a buffer to joint limits [radians]. If moving quickly, make this larger.

    ## Topic names
    cartesian_command_in_topic: ~/delta_twist_cmds  # Topic for incoming Cartesian twist commands
    joint_command_in_topic: ~/delta_joint_cmds # Topic for incoming joint angle commands
    joint_topic: /joint_states
    status_topic: ~/status # Publish status to this topic
    command_out_topic: /forward_position_controller/commands # Publish outgoing commands here

    ## Collision checking
    check_collisions: true # Check collisions?
    collision_check_rate: 10.0 # [Hz] Collision-checking can easily bog down a CPU if done too often.
    # Two collision check algorithms are available:
    # "threshold_distance" begins slowing down when nearer than a specified distance threshold to a collision
    # "stop_distance" stops if a collision is nearer than the worst-case stopping distance and the distance threshold
    collision_check_type: threshold_distance
    # Parameters for "threshold_distance"-type collision checking
    self_collision_proximity_threshold: 0.01 # Start decelerating when a self-collision is this far [m]
    scene_collision_proximity_threshold: 0.02 # Start decelerating when a scene collision is this far [m]
    # Parameters for "stop_distance"-type collision checking
    collision_distance_safety_factor: 1000.0 # Must be >= 1. A large safety factor is recommended to account for latency
    min_allowable_collision_distance: 0.01 # Stop if a collision is closer than this [m]
