# 8BitDo Ultimate 2C Controller Configuration
# Button/Axis indices may vary depending on controller mode (X-input, D-input, Switch)
# These are typical values for X-input mode on Linux

# Controller device
device: "/dev/input/js0"

# Joystick axis indices (typically -1.0 to 1.0)
axes:
  left_stick_horizontal: 0    # Left/Right on left joystick -> Y translation
  left_stick_vertical: 1      # Up/Down on left joystick -> X translation
  right_stick_horizontal: 2   # Left/Right on right joystick -> Rotation around Z (yaw)
  right_stick_vertical: 3     # Up/Down on right joystick -> Rotation around Y (pitch)
  left_trigger: 4             # LT -> Z down
  right_trigger: 5            # RT -> Z up
  dpad_horizontal: 6          # D-pad left/right -> Rotation around X (roll)
  dpad_vertical: 7            # D-pad up/down (unused)

# Button indices (0 = not pressed, 1 = pressed)
buttons:
  a: 0                        # Enable/Disable (deadman switch)
  b: 1                        # Return to home
  x: 2                        # Decrease speed
  y: 3                        # Increase speed
  left_bumper: 4              # Close gripper
  right_bumper: 5             # Open gripper
  back: 6                     # Reserved
  start: 7                    # Reserved
  home: 8                     # Emergency stop
  left_stick_press: 9         # Reserved
  right_stick_press: 10       # Reserved

# Velocity scaling factors (m/s and rad/s)
velocity_scaling:
  linear_base: 0.05           # Base linear velocity (m/s)
  angular_base: 0.2           # Base angular velocity (rad/s)
  min_multiplier: 0.1         # Minimum speed multiplier
  max_multiplier: 2.0         # Maximum speed multiplier
  multiplier_step: 0.1        # Speed change per button press

# Deadzone to prevent drift
deadzone: 0.1                 # Ignore inputs below this threshold

# Control update rate
publish_rate: 50              # Hz
