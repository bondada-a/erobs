aruco_pose:
  ros__parameters:
    camera_tf_frame: 'camera_link'
    sample_name: 'sample_1'
    pre_pickup_location: # Define x, y, z adjustments with respect to tag's coordinate reference frame for pre-pickup
      name: 'pre_pickup'
      x_adj: 0.0
      y_adj: 0.0
      z_adj: 0.0
    offset_on_marker_x: -0.00
    offset_on_marker_y: 0.0
    fiducial_marker_family: 'DICT_5X5_100'
    physical_marker_size: 0.5 # measure the printed tag size
    image_topic: "/camera/camera/color/image_raw"
    number_of_observations: 10 # size of the moving window for the median filter
    cam_to_lens_x: 0.0
    cam_to_lens_y: 0.0
    cam_to_lens_z: 0.0
