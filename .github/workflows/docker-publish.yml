name: Build and Push Docker Images to GHCR

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Which image to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - beambot_img
          - beambot_img_v2
          - beambot_bsui
      tag:
        description: 'Image tag (default: latest)'
        required: false
        default: 'latest'
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  build-beambot-img:
    if: ${{ github.event.inputs.image == 'both' || github.event.inputs.image == 'beambot_img' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beambot_img
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/erobs-common-img/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/beambot_img:${{ github.event.inputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/beambot_img:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-beambot-img-v2:
    if: ${{ github.event.inputs.image == 'both' || github.event.inputs.image == 'beambot_img_v2' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beambot_img_v2
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/erobs-common-img/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/beambot_img_v2:${{ github.event.inputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/beambot_img_v2:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-beambot-bsui:
    if: ${{ github.event.inputs.image == 'both' || github.event.inputs.image == 'beambot_bsui' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          df -h

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push beambot_bsui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/bsui/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/beambot_bsui:${{ github.event.inputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/beambot_bsui:${{ github.sha }}
          build-args: |
            CACHEBUST=${{ github.run_id }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
