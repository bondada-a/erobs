[workspace]
name = "erobs"
version = "0.1.0"
description = "Extensible Robotic Beamline Scientists"
authors = [
  "Phillip Maffettone <pmaffetto@bnl.gov>",
  "Chandima Fernando <wfernando1@bnl.gov",
]
channels = ["robostack-jazzy", "conda-forge"]
platforms = ["linux-64"]
license = "BSD-3-Clause"
license-file = "LICENSE"
readme = "README.md"
repository = "https://github.com/nsls2/erobs"


[activation]
scripts = ["./setup.sh"]

[tasks]
build = "./build.sh"
test = "./test.sh"


[tool.ruff.lint]
select = [
  "B",       # flake8-bugbear - https://docs.astral.sh/ruff/rules/#flake8-bugbear-b
  "C4",      # flake8-comprehensions - https://docs.astral.sh/ruff/rules/#flake8-comprehensions-c4
  "E",       # pycodestyle errors - https://docs.astral.sh/ruff/rules/#error-e
  "F",       # pyflakes rules - https://docs.astral.sh/ruff/rules/#pyflakes-f
  "W",       # pycodestyle warnings - https://docs.astral.sh/ruff/rules/#warning-w
  "I",       # isort - https://docs.astral.sh/ruff/rules/#isort-i
  "UP",      # pyupgrade - https://docs.astral.sh/ruff/rules/#pyupgrade-up
  "SLF",     # self - https://docs.astral.sh/ruff/settings/#lintflake8-self
  "PLC2701", # private import - https://docs.astral.sh/ruff/rules/import-private-name/
  "LOG015",  # root logger call - https://docs.astral.sh/ruff/rules/root-logger-call/
  "S101",    # assert - https://docs.astral.sh/ruff/rules/assert/
  "D",       # docstring - https://docs.astral.sh/ruff/rules/#pydocstyle-d
]
ignore = [
  "B901", # Return in a generator is needed for plans
  "D104",
]
preview = true # so that preview mode PLC2701 is enabled

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[dependencies]
pre-commit = ">=4.2.0,<5"
pre-commit-hooks = ">=4.2.0,<5"
ruff = ">=0.11.8,<0.12"
bluesky = "*"
ophyd = "*"
pyepics = "*"
Ipython = "*"
ros-jazzy-moveit = ">=2.12.4,<3"
ros-jazzy-moveit-msgs = ">=2.6.0,<3"
ros-jazzy-moveit-ros-planning-interface = ">=2.12.4,<3"
ros-jazzy-moveit-ros-move-group = ">=2.12.4,<3"
ros-jazzy-moveit-kinematics = ">=2.12.4,<3"
ros-jazzy-moveit-simple-controller-manager = ">=2.12.4,<3"
ros-jazzy-moveit-planners = ">=2.12.4,<3"
ros-jazzy-moveit-configs-utils = ">=2.12.4,<3"
ros-jazzy-ur-robot-driver = ">=3.7.0,<4"
ros-jazzy-xacro = ">=2.1.1,<3"
ros-jazzy-joint-state-publisher = ">=2.4.1,<3"
ros-jazzy-joint-state-publisher-gui = ">=2.4.1,<3"
ros-jazzy-rosbridge-server = ">=2.4.2,<3"
ros-jazzy-ros2-control = ">=4.43.0,<5"
ros-jazzy-ros2-controllers = ">=4.37.0,<5"
ros-jazzy-moveit-ros-control-interface = ">=2.12.4,<3"
ros-jazzy-py-binding-tools = ">=2.0.1,<3"
ros-jazzy-moveit-task-constructor-core = ">=0.1.3,<0.2"
ros-jazzy-moveit-task-constructor-msgs = ">=0.1.3,<0.2"
