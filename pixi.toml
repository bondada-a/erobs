
[workspace]
authors = ["Max Rakitin <mrakitin@bnl.gov>, Jennefer Maldonado <jmaldonad@bnl.gov>, Aditya Bondada <abondada@bnl.gov>"]
channels = ["conda-forge", "robostack-jazzy"]
name = "rclpy"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
topic-list = "ros2 topic list"
node-list = "ros2 node list"

[feature.ros.dependencies]
ipython = ">=9.9.0,<10"
ros-jazzy-rclpy = ">=7.1.11,<8"
ros-jazzy-ros2cli = ">=0.32.9,<0.33"
ros-jazzy-ros2topic = ">=0.32.9,<0.33"
ros-jazzy-ros2action = ">=0.32.9,<0.33"
ros-jazzy-ros2node = ">=0.32.9,<0.33"
ros-jazzy-turtlesim = ">=1.8.3,<2"
ros-jazzy-rosidl-default-generators = ">=1.6.0,<2"
ros-jazzy-rosidl-default-runtime = ">=1.6.0,<2"
ros-jazzy-rosidl-generator-py = ">=0.22.2,<0.23"
ros-jazzy-rosidl-generator-c = ">=4.6.7,<5"
ros-jazzy-ament-cmake-python = ">=2.5.6,<3"
ros-jazzy-geometry-msgs = ">=5.3.7,<6"
ros-jazzy-std-msgs = ">=5.3.7,<6"
colcon-common-extensions = ">=0.3.0,<0.4"
ros-jazzy-rmw-cyclonedds-cpp = ">=2.2.3,<3"
ros-jazzy-ros2doctor = ">=0.32.9,<0.33"
websocket-client = ">=1.9.0,<2"
ros-jazzy-ros2run = ">=0.32.9,<0.33"
ros-jazzy-demo-nodes-cpp = ">=0.33.10,<0.34"

[feature.profile.dependencies]
bluesky-base = "==1.14.6"
matplotlib-base= ">=3.9.3,<4"
networkx = ">=3.4.2,<4"
nslsii = "==0.11.4"
numpy = "*"
ophyd = ">=1.11.0"
pyepics = "*"
python = "*"
semver = ">=3.0.4,<4"
tiled-client = ">=0.1.6"
lmfit = ">=1.3.4,<2"
paramiko = ">=4.0.0,<5"
peakutils = ">=1.3.5,<2"
suitcase-utils = ">=0.5.4,<0.6"
arvpyf = ">=0.4.3,<0.5"
telnetlib3 = ">=1.0.4,<2"
hdf5-external-filter-plugins = ">=0.1.0,<0.2"
databroker = "==2.0.0"
bluesky-tiled-plugins = ">=2.0.0b68"
#ophyd-async = ">=0.13.7,<0.14"


[feature.profile.pypi-dependencies]
pvxslibs = ">=1.3.2, <2"

[environments]
ros2 = {features=["profile", "ros"], solve-group="profile"}



